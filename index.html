<script>
var _fbReady = false;
var _fbCallbacks = [];

function onFirebaseReady(fn) {
  if(_fbReady) fn();
  else _fbCallbacks.push(fn);
}

window.fbSave = function(data){
  if(!data || !Array.isArray(data.core)) return;
  window._localChange = true;
  window.db.ref("clubdata").set(data, function(err){
    if(err) console.error("Firebase save error:", err);
    setTimeout(function(){ window._localChange = false; }, 500);
  });
};

window.fbListen = function(onData){
  window.db.ref("clubdata").on("value", function(snapshot){
    if(window._localChange) return;
    var val = snapshot.val();
    if(val && val.core){
      onData(val);
    }
  });
};

window.fbInit = function(currentData, onData){
  window.db.ref("clubdata").once("value", function(snapshot){
    var val = snapshot.val();
    if(val && val.core){
      var fbMembers = (val.core||[]).length + (val.reserve||[]).length;
      var localMembers = (currentData.core||[]).length + (currentData.reserve||[]).length;
      var fbSessions = (val.sessions||[]).length;
      var localSessions = (currentData.sessions||[]).length;
      if(fbMembers >= localMembers || fbSessions >= localSessions){
        onData(val);
      } else {
        window.fbSave(currentData);
        onData(currentData);
      }
    } else {
      if(currentData && Array.isArray(currentData.core)){
        window.fbSave(currentData);
      }
    }
    window.fbListen(onData);
    window._fbInitialized = true;
    console.log("Firebase connected");
  });
};

window._fbPollCount = 0;
function pollForFirebase() {
  window._fbPollCount++;
  if (typeof firebase !== 'undefined') {
    initFirebaseApp();
  } else if (window._fbPollCount < 100) {
    setTimeout(pollForFirebase, 100);
  } else {
    console.warn("Firebase SDK never became available after 10 seconds");
  }
}
pollForFirebase();

function initFirebaseApp() {
  try {
    var firebaseConfig = {
      apiKey: "AIzaSyDQxWf7uuqAU_yIcr75z44g0soOgcE7-6c",
      authDomain: "mahjongmonday-707e6.firebaseapp.com",

      projectId: "mahjongmonday-707e6",
      storageBucket: "mahjongmonday-707e6.firebasestorage.app",
      messagingSenderId: "321481942118",
      appId: "1:321481942118:web:0c21ebb802dab14a98b9a7"
    };
    firebase.initializeApp(firebaseConfig);
    window.db = firebase.database();
    _fbReady = true;
    _fbCallbacks.forEach(function(fn){ try{ fn(); }catch(e){ console.error("Firebase callback error:", e); } });
  } catch(e) {
    console.warn("Firebase setup error:", e.message);
  }
}

</script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahjong Monday Group</title>
<style>
:root {
  --bg: #f8fefe; --bg2: #edf8f8; --bg3: #f2fbfb; --bg4: #e6f5f5;
  --gold: #1a7878; --gold-lt: #d5ffff; --cream: #d2f0f0;
  --border: #88c8c8; --border2: #aadede; --muted: #444444;
  --green: #d2fffd; --green-bg: #ecfaf4; --green-dk: #d2fff0;
  --red: #b02848; --red-bg: #fef0f4;
  --amber: #e2ffff; --wait: #d2ffff; --wait-bg: #e2f6fa;
  --yellow-bg: #f4fae8; --yellow: #ffffe0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:#000000;font-family:Georgia,serif;font-size:17px;min-height:100vh;
  background-image:radial-gradient(ellipse at 20% 10%,#cceaea 0%,transparent 50%),
    radial-gradient(ellipse at 80% 90%,#d5f6f6 0%,transparent 50%)}
button{font-family:Georgia,serif;cursor:pointer}
select,input{font-family:Georgia,serif}
a{text-decoration:none}

/* Toast */
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);
  border-radius:8px;padding:10px 20px;font-size:16.2px;z-index:999;
  box-shadow:0 4px 20px #00000088;white-space:nowrap;transition:transform .3s ease}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.success{background:#ecfaf4;border:1px solid #d2fffd;color:#222222}
#toast.error{background:#fef0f4;border:1px solid #b02848;color:#b02848}
#toast.info{background:#eaf8f8;border:1px solid #1a7878;color:#222222}

/* Header */
header{padding:18px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;
  background:linear-gradient(180deg,#d8f2f2 0%,transparent 100%)}
#tile-icon{font-size:40px;filter:drop-shadow(0 0 8px #00bfbfaa)}
.hd-title{font-size:25px;font-weight:bold;color:var(--gold)}
.hd-sub{font-size:16px;color:#555555;letter-spacing:.1em;text-transform:uppercase}
.hd-right{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.btn-persist{background:none;border:1px solid var(--border);border-radius:4px;color:#555555;font-size:16px;padding:3px 8px}
.btn-persist.on{border-color:#4de88444;color:#4de884}
.hd-io{display:flex;gap:6px}
.btn-io{background:none;border:1px solid #e2ffff;border-radius:4px;color:#1a7070;font-size:16px;padding:2px 6px;cursor:pointer}
label.btn-io{cursor:pointer}

/* Nav */
nav{display:flex;border-bottom:1px solid var(--border);background:#f2fbfb}
.nav-btn{flex:1;padding:13px 0;background:none;border:none;border-bottom:2px solid transparent;
  color:#555555;font-size:16.2px;font-family:Georgia,serif;cursor:pointer;letter-spacing:.06em;transition:all .15s}
.nav-btn.active{background:#d4eeee;border-bottom-color:var(--gold);color:var(--gold)}

/* Main */
main{padding:18px 14px;max-width:560px;margin:0 auto}

/* Buttons */
.btn-gold{background:var(--gold);border:none;border-radius:6px;color:#222222;font-size:16.2px;font-weight:bold;padding:9px 18px}
.btn-ghost{background:none;border:1px solid var(--border);border-radius:6px;color:#555555;font-size:16.2px;padding:9px 18px}
.btn-sm{font-size:16px;padding:7px 14px}
.btn-danger{background:none;border:1px solid #e08090;border-radius:8px;color:#b03050;font-size:16.2px;padding:9px 0;width:100%}
.btn-rsvp{padding:3px 9px;border-radius:99px;font-size:16px;cursor:pointer;font-family:Georgia,serif;background:transparent;transition:all .15s}
.btn-yes{border:2px solid #0a6035;color:#0a6035;background:#ffffff;padding:8px 16px;border-radius:99px;font-size:16px;cursor:pointer;font-family:Georgia,serif;font-weight:bold}
.btn-yes.on{background:#0a6035;color:#ffffff;border:2px solid #0a6035;font-weight:bold}
.btn-no{border:2px solid #b02848;color:#b02848;background:#ffffff;padding:8px 16px;border-radius:99px;font-size:16px;cursor:pointer;font-family:Georgia,serif;font-weight:bold}
.btn-no.on{background:#b02848;color:#ffffff;border:2px solid #b02848;font-weight:bold}
.btn-out{border:2px solid #b02848;color:#b02848;padding:8px 16px;border-radius:99px;font-size:16px;cursor:pointer;font-family:Georgia,serif;background:#ffffff;font-weight:bold}
.btn-out.on{background:#b02848;color:#ffffff;border:2px solid #b02848;font-weight:bold}
.btn-check{border:2px solid #0a6035;color:#0a6035;padding:8px 16px;border-radius:99px;font-size:16px;cursor:pointer;font-family:Georgia,serif;background:#ffffff;font-weight:bold}
.btn-check.on{background:#0a6035;color:#ffffff;border:2px solid #0a6035;font-weight:bold}

/* Forms */
.card{background:var(--bg4);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px}
.card.edit-card{border-color:var(--gold)}
.field{margin-bottom:10px}
.field label{display:block;font-size:16px;color:#555555;margin-bottom:3px;letter-spacing:.08em}
.field input,.field select,.field textarea{width:100%;background:#ffffff;border:1px solid #88c8c8;border-radius:6px;
  color:#000000;font-weight:bold;font-family:Georgia,serif;font-size:17.5px;padding:8px 12px}
.field select{appearance:none;-webkit-appearance:none}
.field textarea{resize:vertical;min-height:60px}
.form-row{display:flex;gap:10px;margin-top:10px}
.form-row .btn-gold,.form-row .btn-ghost{flex:1}

/* Section head */
.sec-head{font-size:16px;letter-spacing:.1em;margin-bottom:10px}
.sec-reg{color:#1a1a1a}
.sec-wait{color:#3a7a8a}

/* Session list card */
.sess-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:13px 14px;
  cursor:pointer;margin-bottom:8px;transition:border-color .15s}
.sess-card:hover{border-color:var(--gold)}

.sess-title{font-size:17.5px;font-weight:bold;color:var(--gold);margin-bottom:2px}
.sess-sub{font-size:16px;color:#333333}
.sess-loc{font-size:16px;color:#555555}
.sess-set{font-size:16px;color:var(--wait)}
.sess-alert{font-size:16px;margin-top:3px}
.bar{height:3px;border-radius:2px;background:#b0dede;margin-top:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;background:var(--green);transition:width .4s}
.bar-fill.full{background:var(--gold-lt)}
.sess-count{font-size:23.8px;font-weight:bold;color:var(--green);text-align:right}
.sess-count.full{color:var(--gold)}

/* Seat bar (detail) */
.seat-bar-wrap{margin-top:12px;padding-top:12px;border-top:1px solid var(--border2)}
.seat-bar{height:7px;border-radius:4px;background:#b0dede;overflow:hidden}
.seat-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green),var(--green-dk));transition:width .4s}
.seat-bar-fill.full{background:var(--gold-lt)}

/* Member rows */
.mem-row{background:#f0fbfb;border-radius:8px;border:1px solid var(--border2);overflow:hidden;margin-bottom:5px}
.mem-row-main{display:flex;align-items:center;padding:9px 11px;gap:9px}
.mem-row-actions{padding:0 11px 9px;display:flex;gap:7px;border-top:1px solid #e6f5f5}
.mem-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:16.2px;flex-shrink:0}
.mem-avatar.reg{background:#e8f8f8;border:2px solid var(--gold);color:var(--gold)}
.mem-avatar.wait{background:#eaf8fe;border:1px solid #3a7a8a;color:var(--wait)}
.mem-name{font-size:16.2px;color:#1a1a1a}
.mem-email{font-size:16px;color:#222222}
.mem-stat{font-size:16px;color:#222222}
.btn-dots{background:none;border:none;color:#1a7070;font-size:22.5px;cursor:pointer;padding:2px 5px;line-height:1;margin-left:auto}
.btn-move{flex:1;background:none;border:1px solid var(--border);border-radius:6px;color:#333333;
  font-size:16px;padding:5px 0;cursor:pointer;margin-top:8px;font-family:Georgia,serif}
.btn-remove{flex:1;background:none;border:1px solid #e08090;border-radius:6px;color:#b03050;
  font-size:16px;padding:5px 0;cursor:pointer;margin-top:8px;font-family:Georgia,serif}

/* RSVP rows */
.rsvp-row{display:flex;align-items:center;gap:8px;background:#f0fbfb;border-radius:8px;
  padding:8px 11px;border:1px solid var(--border2);margin-bottom:5px}
.rsvp-row.opted-out{opacity:.6;border-color:#222222}
.rsvp-row.promoted{background:#e8f8fc;border-color:#4de88444}
.rsvp-row.waitlisted{background:#eaf8fe;border-color:#22222244}
.rsvp-avatar-sm{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0}
.badge-in{font-size:16px;color:var(--green);margin-left:6px}
.badge-full{font-size:16px;color:var(--red);margin-left:6px}

/* Email btns */
.email-btn{display:flex;align-items:center;gap:8px;border-radius:8px;padding:11px 14px;
  margin-bottom:6px;border:1px solid #e2ffff;background:#eaf8f8;text-decoration:none;font-family:Georgia,serif}
.email-btn.due{border-color:var(--gold);background:#eaf8f8}
.email-btn.final{border-color:#222222;background:#f0f4fe}
.email-btn.final.due{border-color:var(--gold)}
.email-btn.notify{border-color:#4de88444;background:#e8f8fc}



.email-label{font-size:16.2px}
.email-sub{font-size:16px;color:#222222;margin-top:2px}
.email-arrow{font-size:16px;flex-shrink:0;margin-left:auto}

/* Tier toggle */
.tier-toggle{display:flex;border-radius:6px;overflow:hidden;border:1px solid var(--border);margin-bottom:12px}
.tier-btn{flex:1;padding:7px 0;background:transparent;border:none;color:#000000;
  font-family:Georgia,serif;font-size:16px;font-weight:bold;cursor:pointer}
.tier-btn.active{background:var(--gold);color:#222222}

/* Import preview */
.import-preview{max-height:140px;overflow-y:auto;background:#deffff;border-radius:6px;
  border:1px solid var(--border2);padding:8px 10px;margin-bottom:12px}
.import-row{font-size:16px;padding:2px 0;display:flex;gap:8px}
.import-row.skip{color:#222222}
.import-row.ok{color:#222222}

/* BringSet */
.bringset-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.bringset-num{font-size:16px;color:#222222;width:18px;flex-shrink:0;text-align:right}
.bringset-select{flex:1;background:#ffffff;border:1px solid #88c8c8;border-radius:6px;
  color:#000000;font-family:Georgia,serif;font-size:16.2px;padding:6px 10px;appearance:none}
.bringset-clear{background:none;border:none;color:#1a7070;font-size:22.5px;cursor:pointer;padding:0 4px;line-height:1}

/* Notify reserve email btn */
.notify-wrap{background:#e8f8fc;border:1px solid #4de88444;border-radius:8px;
  padding:9px 14px;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* Passcode */
.passcode-overlay{background:#e4f6f6;border:1px solid var(--border);border-radius:12px;padding:32px 24px;text-align:center;max-width:300px;margin:40px auto}
.passcode-title{font-size:17.5px;color:var(--gold);margin-bottom:8px;font-weight:bold}
.passcode-sub{font-size:16px;color:#333333;margin-bottom:24px}
.passcode-dots{display:flex;justify-content:center;gap:12px;margin-bottom:24px}
.passcode-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);background:transparent;transition:background .15s}
.passcode-dot.filled{background:var(--gold-lt);border-color:var(--gold)}
.passcode-dot.error{background:var(--red);border-color:var(--red)}
.passcode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:220px;margin:0 auto}
.passcode-key{background:#ffffff;border:2px solid var(--border);border-radius:10px;padding:14px 0;
  font-size:22px;color:#000000;font-weight:bold;cursor:pointer;font-family:Georgia,serif;transition:background .15s}
.passcode-key:hover{background:#d8f2f2}
.passcode-key.zero{grid-column:2}
.passcode-key.del{background:none;border-color:transparent;color:#555555;font-size:17.5px}
.passcode-err{font-size:16px;color:#cc0033;margin-top:12px;min-height:18px}
/* Util */
.flex{display:flex}.gap8{gap:8px}.gap10{gap:10px}.mb8{margin-bottom:8px}.mb14{margin-bottom:14px}
.mb16{margin-bottom:16px}.mb18{margin-bottom:18px}.mb20{margin-bottom:20px}
.f1{flex:1}.tal{text-align:left}.hidden{display:none}
.empty-state{text-align:center;color:#222222;padding:48px;font-size:17.5px}
.hint{font-size:16px;color:#4de884;margin-bottom:12px}
.hint-muted{font-size:16px;color:#222222}
</style>
</head>
<body>

<div id="toast"></div>

<!-- Header -->
<header>
  <div id="tile-icon">🀄</div>
  <div>
    <div class="hd-title">Mahjong Monday Group</div>
    <div class="hd-sub" id="hd-sub" style="color:#111111;font-size:13px">Loading…</div>
  </div>
  <div class="hd-right">
    <button class="btn-persist" id="btn-persist" onclick="togglePersist()">Save data</button>
    <div class="hd-io">
      <button class="btn-io" onclick="exportData()">↓ Export</button>
      <label class="btn-io">↑ Import<input type="file" accept=".json" onchange="importJson(event)" style="display:none"></label>
    </div>
  </div>
</header>

<!-- Nav -->
<nav>
  <button class="nav-btn active" id="nav-schedule" onclick="switchView('schedule')">📅 Schedule</button>
  <button class="nav-btn" id="nav-members" onclick="switchView('members')">👥 Members</button>
  <button class="nav-btn" id="nav-email" onclick="switchView('email')">📧 Email</button>
  <button class="nav-btn" id="nav-history" onclick="switchView('history')">📋 History</button>

function toDateStr(d){
  return new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
}
function daysUntil(d){
  const t=new Date(); t.setHours(0,0,0,0);
  return Math.round((new Date(d+"T00:00:00")-t)/86400000);
}
function isUpcoming(s){return new Date(s.date+"T12:00:00")>=new Date(new Date().toDateString())}
function uid(){return "m"+Date.now()+Math.random().toString(36).slice(2,6)}
function getNextMondays(n=12){
  const out=[],d=new Date(); d.setHours(12,0,0,0);
  const day=d.getDay(), skip=day===1?0:(8-day)%7||7;
  d.setDate(d.getDate()+skip);
  for(let i=0;i<n;i++){out.push(new Date(d).toISOString().slice(0,10));d.setDate(d.getDate()+7);}
  return out;
}

function getSeats(session){
  const {core,reserve}=D;
  const coreYes=core.filter(m=>(session.rsvps[m.id]?.status||"yes")!=="no");
  const coreNo=core.filter(m=>session.rsvps[m.id]?.status==="no");
  const slots=Math.max(0,MAX_PLAYERS-coreYes.length);
  const wl=reserve.filter(m=>session.rsvps[m.id]?.status==="yes")
    .sort((a,b)=>(session.rsvps[a.id]?.timestamp||0)-(session.rsvps[b.id]?.timestamp||0));
  const confirmedReserve=wl.slice(0,slots);
  const overflowReserve=wl.slice(slots);
  const pendingReserve=reserve.filter(m=>!session.rsvps[m.id]||session.rsvps[m.id]?.status==="pending");
  // Session waitlist: Reserve members who joined the waitlist when full, sorted by timestamp
  const sessionWaitlist=reserve.filter(m=>session.rsvps[m.id]?.status==="waitlisted")
    .sort((a,b)=>(session.rsvps[a.id]?.timestamp||0)-(session.rsvps[b.id]?.timestamp||0));
  const total=coreYes.length+confirmedReserve.length;
  return{coreYes,coreNo,confirmedReserve,overflowReserve,pendingReserve,sessionWaitlist,
    total,spots:Math.max(0,MAX_PLAYERS-total),full:total>=MAX_PLAYERS};
}

function autoAssignSetsForSession(session){
  // Only assign if not already assigned
  var existing = Array.isArray(session.bringSet) ? session.bringSet.filter(Boolean) : [];
  var seat = getSeats(session);
  var tablesNeeded = Math.min(Math.ceil(seat.total / 4), MAX_SETS);
  if(tablesNeeded === 0) return existing;

  // If already fully assigned, keep as is
  if(existing.length >= tablesNeeded) return existing;

  // Pool: confirmed attendees who own a set, not already assigned
  var allMembers = [...D.core, ...D.reserve];
  var attending = [
    ...seat.coreYes.map(m => m.name),
    ...seat.confirmedReserve.map(m => m.name)
  ];
  var setOwners = attending.filter(function(name){
    var m = allMembers.find(function(x){ return x.name === name; });
    return m && m.hasSet === "y";
  }).filter(function(name){ return !existing.includes(name); });

  // Shuffle
  for(var i = setOwners.length - 1; i > 0; i--){
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = setOwners[i]; setOwners[i] = setOwners[j]; setOwners[j] = tmp;
  }

  var needed = tablesNeeded - existing.length;
  var assigned = existing.concat(setOwners.slice(0, needed));

  // If not enough set owners, fill from anyone attending
  if(assigned.length < tablesNeeded){
    var others = attending.filter(function(n){ return !assigned.includes(n); });
    for(var i = others.length - 1; i > 0; i--){
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = others[i]; others[i] = others[j]; others[j] = tmp;
    }
    assigned = assigned.concat(others.slice(0, tablesNeeded - assigned.length));
  }

  return assigned;
}

  const s=D.sessions.find(s=>s.id==sessId);

  if(!s.rsvps)s.rsvps={};
  s.rsvps[memberId]={status,timestamp:Date.now()};
  // Auto-promote from session waitlist if spots opened
  autoPromote(s);
  // Flag revision needed if final email was already sent
  if(s.finalEmailSent){ showRevisionAlert=sessId; }
  saveData();render();
}

function autoPromote(session){
  const seat=getSeats(session);
  if(seat.spots>0 && seat.sessionWaitlist.length>0){
    const toPromote=seat.sessionWaitlist.slice(0,seat.spots);
    toPromote.forEach(m=>{
      session.rsvps[m.id]={status:"yes",timestamp:session.rsvps[m.id]?.timestamp||Date.now()};
    });
    if(toPromote.length>0){
      toast(`${toPromote.length} member${toPromote.length!==1?"s":""} promoted from session waitlist!`,"success");
    }
  }
}

  const existing=[...D.core,...D.reserve].map(m=>m.name.toLowerCase());
  const tier=importTier==="core"?"core":"reserve";
  const toAdd=importPreview.filter(m=>!existing.includes(m.name.toLowerCase()))
    .map(m=>({id:uid(),name:m.name,email:m.email,phone:m.phone||"",hasSet:m.hasSet||"n"}));
  D[tier].push(...toAdd);
  importPreview=null;showImport=false;saveData();render();
  toast(`${toAdd.length} members imported as ${importTier}`,"success");
}

function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)return[];
  const headers=lines[0].split(",").map(h=>h.trim().replace(/^"|"$/g,""));
  const nameIdx=headers.findIndex(h=>/name/i.test(h));
  const emailIdx=headers.findIndex(h=>/email/i.test(h));
  const phoneIdx=headers.findIndex(h=>/phone|mobile|cell/i.test(h));
  const setIdx=headers.findIndex(h=>/set/i.test(h));
  return lines.slice(1).map(l=>{
    const cols=l.split(",").map(c=>c.trim().replace(/^"|"$/g,""));
    return{name:nameIdx>=0?cols[nameIdx]||"":"",email:emailIdx>=0?cols[emailIdx]||"":"",phone:phoneIdx>=0?cols[phoneIdx]||"":"",hasSet:setIdx>=0?(cols[setIdx]||"n").toLowerCase().startsWith("y")?"y":"n":"n"};
  }).filter(r=>r.name);
}

function handleCSV(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{importPreview=parseCSV(ev.target.result);render();};
  r.readAsText(f);e.target.value="";
}

// BringSet helpers

function randomAssignSets(){
  if(!editSess) return;
  const seat = getSeats(editSess);
  // Attending members who own a set
  const attending = [
    ...seat.coreYes.map(m=>m.name),
    ...seat.confirmedReserve.map(m=>m.name)
  ];
  const allMembers = [...D.core, ...D.reserve];
  const setOwners = attending.filter(name => {
    const m = allMembers.find(m=>m.name===name);
    return m && m.hasSet==="y";
  });
  // How many tables needed (ceil of confirmed/4)
  const tablesNeeded = Math.min(Math.ceil(seat.total / 4), MAX_SETS);
  if(setOwners.length === 0){
    toast("No attending members own a set","error"); return;
  }
  // Shuffle set owners
  for(let i=setOwners.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [setOwners[i],setOwners[j]]=[setOwners[j],setOwners[i]];
  }
  editSess.bringSet = setOwners.slice(0, tablesNeeded);
  render();
  toast(`${editSess.bringSet.length} set-bringer${editSess.bringSet.length!==1?"s":""} assigned for ${tablesNeeded} table${tablesNeeded!==1?"s":""}`, "success");
}
function setBringSetSlot(idx,name){
  if(!editSess)return;
  const arr=Array.isArray(editSess.bringSet)?[...editSess.bringSet]:[];
  if(name==="")arr.splice(idx,1);
  else arr[idx]=name;
  editSess.bringSet=arr.filter(Boolean);
  render();
}
function setNewSessBringSetSlot(idx,name){
  const arr=Array.isArray(newSess.bringSet)?[...newSess.bringSet]:[];
  if(name==="")arr.splice(idx,1);
  else arr[idx]=name;
  newSess.bringSet=arr.filter(Boolean);
  render();
}

function renderBringSetPicker(selected,attendees,onSlotChange,showRandom){
  const rowCount=Math.min(selected.length+1,MAX_SETS);
  let html=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
    <div class="hint-muted">One set per table of 4 — ${selected.length}/${MAX_SETS} assigned</div>
    ${showRandom?'<button class="btn-ghost" style="font-size:16px;padding:4px 10px;margin-left:auto" onclick="randomAssignSets()">🎲 Auto-assign</button>':""}
  </div>`;
  for(let i=0;i<rowCount;i++){
    const val=selected[i]||"";
    const taken=selected.filter((_,j)=>j!==i);
    const avail=attendees.filter(n=>!taken.includes(n));
    html+=`<div class="bringset-row">
      <div class="bringset-num">${i+1}.</div>
      <select class="bringset-select" onchange="${onSlotChange}(${i},this.value)">
        <option value="">— Table ${i+1}: unassigned —</option>
        ${avail.map(n=>`<option value="${n}"${val===n?" selected":""}>${n}</option>`).join("")}
      </select>
      ${val?'<button class="bringset-clear" onclick="'+onSlotChange+'('+i+',\'\')">×</button>':""}
    </div>`;
  }
  if(selected.length===MAX_SETS)html+=`<div style="font-size:16px;color:var(--green)">✓ All 4 tables assigned</div>`;
  return html;
}


function enterPasscode(digit){
  if(passcodeInput.length>=4) return;
  passcodeInput += digit;
  passcodeError = false;
  if(passcodeInput.length===4){
    if(passcodeInput==="1016"){
      membersUnlocked=true;
      passcodeInput="";
      render();
      toast("Members unlocked","success");
    } else {
      passcodeError=true;
      setTimeout(()=>{passcodeInput="";passcodeError=false;render();},900);
      render();
    }
  } else {
    render();
  }
}

function renderEmail(main){
  var html="";
  var upcoming=D.sessions.filter(isUpcoming);
  html+="<div style='margin-bottom:18px'><div style='font-size:17px;font-weight:bold;color:#000;margin-bottom:8px'>Select Session</div>";
  html+="<select style='width:100%;font-size:16px;padding:10px;border:2px solid #88c8c8;border-radius:6px;color:#000;background:white' onchange='emailSessionId=this.value?Number(this.value):null;render()'>";
  html+="<option value=''>- Choose a session -</option>";
  upcoming.forEach(function(s){
    var sel=(emailSessionId&&s.id==emailSessionId)?" selected":"";
    html+="<option value='"+s.id+"'"+sel+">"+toDateStr(s.date)+" - "+s.time+"</option>";
  });
  html+="</select></div>";
  if(!emailSessionId){
    html+="<div style='text-align:center;padding:40px;color:#888;font-size:16px'>Select a session above</div>";
    main.innerHTML=html; return;
  }
  var session=D.sessions.find(function(s){return s.id==emailSessionId;});
  if(!session){main.innerHTML=html;return;}
  var seat=getSeats(session);
  var days=daysUntil(session.date);
  var sentLabel=session.finalEmailSent?" (Sent)":"";
  // Summary
  html+="<div style='background:#eaf8f8;border:1px solid #88c8c8;border-radius:10px;padding:14px;margin-bottom:18px'>";
  html+="<div style='font-size:17px;font-weight:bold;color:#000'>"+toDateStr(session.date)+"</div>";
  html+="<div style='font-size:15px;color:#333'>"+session.time+(session.location?" - "+session.location:"")+"</div>";
  html+="<div style='font-size:15px;color:#333;margin-top:4px'>"+seat.total+"/"+MAX_PLAYERS+" confirmed - "+seat.spots+" open</div>";
  html+="</div>";
  // Buttons - use data-type attribute to avoid quote issues
  html+="<div style='margin-bottom:12px'><div style='font-size:16px;font-weight:bold;color:#000;margin-bottom:6px'>4-Day Reminder"+(days===4?" - DUE TODAY":"")+"</div>";
  html+="<button data-etype='4day' onclick='sendEmailType(this.dataset.etype)' style='width:100%;padding:14px;background:#1a7878;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Georgia,serif'>Send 4-Day Reminder</button></div>";
  html+="<div style='margin-bottom:12px'><div style='font-size:16px;font-weight:bold;color:#000;margin-bottom:6px'>Final Reminder - Day Before"+(days===1?" - DUE TODAY":"")+sentLabel+"</div>";
  html+="<button data-etype='1day' onclick='sendEmailType(this.dataset.etype)' style='width:100%;padding:14px;background:#1a7878;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Georgia,serif'>Send Final Reminder</button></div>";
  if(seat.spots>0&&D.reserve.length>0){
    html+="<div style='margin-bottom:12px'><div style='font-size:16px;font-weight:bold;color:#000;margin-bottom:6px'>"+seat.spots+" spot"+(seat.spots!==1?"s":"")+" open - notify Reserve</div>";
    html+="<button data-etype='notify' onclick='sendEmailType(this.dataset.etype)' style='width:100%;padding:14px;background:#0a6035;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Georgia,serif'>Notify Reserve Members</button></div>";
  }
  if(showRevisionAlert===session.id){
    html+="<div style='background:#fff0f4;border:2px solid #b02848;border-radius:8px;padding:14px;margin-bottom:14px'>";
    html+="<div style='font-size:15px;color:#b02848;font-weight:bold;margin-bottom:8px'>Player list changed after final email sent</div>";
    html+="<button data-etype='revision' onclick='sendEmailType(this.dataset.etype)' style='width:100%;padding:12px;background:#b02848;color:white;border:none;border-radius:6px;font-size:15px;cursor:pointer;font-family:Georgia,serif'>Send Revision Email</button></div>";
  }
  main.innerHTML=html;
}

function sendEmailType(type){
  var session=D.sessions.find(function(s){return s.id==emailSessionId;});
  if(!session){alert("Please select a session first.");return;}
  var url="";
  var onSent=null;
  if(type==="4day") url=build4DayEmail(session);
  else if(type==="1day"){url=build1DayEmail(session);onSent=function(){markFinalSent(session.id);};}
  else if(type==="notify") url=buildNotifyEmail(session);
  else if(type==="revision"){url=buildRevisionEmail(session);onSent=function(){showRevisionAlert=null;render();};}
  if(url) showEmailComposer(url,onSent);
}


function showEmailComposer(url, onSent) {
  if(!url) { alert("No email data. Please select a session first."); return; }
  var qIdx = url.indexOf("?");
  var params = new URLSearchParams(url.substring(qIdx+1));
  var bcc = params.get("bcc") || "";
  var subject = decodeURIComponent(params.get("subject") || "");
  var body = decodeURIComponent(params.get("body") || "");
  var emails = bcc.split(",").filter(Boolean);

  var overlay = document.createElement("div");
  overlay.style.cssText = "position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:20px;box-sizing:border-box;overflow-y:auto";
  overlay.onclick = function(e){ if(e.target===overlay) overlay.remove(); };

  var box = document.createElement("div");
  box.style.cssText = "background:white;border-radius:12px;padding:24px;max-width:600px;width:100%;margin:auto;margin-top:20px";

  var title = document.createElement("div");
  title.style.cssText = "font-size:20px;font-weight:bold;color:#0a3030;margin-bottom:12px";
  title.textContent = "Send Email";
  box.appendChild(title);

  var instr = document.createElement("div");
  instr.style.cssText = "background:#eaf8f8;border-radius:8px;padding:12px;font-size:14px;color:#333;margin-bottom:16px;line-height:1.7";
  instr.innerHTML = "<strong>Steps:</strong><br>1. Tap Copy Addresses &rarr; paste into BCC in Gmail<br>2. Tap Open Gmail &rarr; subject &amp; body are pre-filled<br>3. Paste addresses into BCC field &rarr; Send<br>4. Come back &rarr; tap Mark as Sent";
  box.appendChild(instr);

  // BCC addresses
  var lbl1 = document.createElement("div");
  lbl1.style.cssText = "font-size:14px;font-weight:bold;color:#0a3030;margin-bottom:4px";
  lbl1.textContent = "BCC: " + emails.length + " members";
  box.appendChild(lbl1);

  var ta = document.createElement("textarea");
  ta.value = emails.join(", ");
  ta.readOnly = true;
  ta.style.cssText = "width:100%;height:80px;border:2px solid #88c8c8;border-radius:6px;padding:8px;font-size:13px;color:#000;box-sizing:border-box;font-family:monospace;margin-bottom:6px";
  ta.onclick = function(){ this.select(); };
  box.appendChild(ta);

  function makeBtn(text, bg, fn) {
    var b = document.createElement("button");
    b.textContent = text;
    b.style.cssText = "padding:9px 16px;background:"+bg+";color:white;border:none;border-radius:6px;font-size:14px;cursor:pointer;font-family:Georgia,serif;margin-bottom:14px;margin-right:8px";
    b.onclick = fn;
    return b;
  }

  box.appendChild(makeBtn("Copy Addresses", "#1a7878", function(){
    ta.select();
    try{ navigator.clipboard.writeText(ta.value).then(function(){ ta.style.background="#eaf8f8"; setTimeout(function(){ ta.style.background=""; },1500); }); }
    catch(e){ document.execCommand("copy"); }
  }));

  // Subject
  var lbl2 = document.createElement("div");
  lbl2.style.cssText = "font-size:14px;font-weight:bold;color:#0a3030;margin-bottom:4px";
  lbl2.textContent = "Subject:";
  box.appendChild(lbl2);

  var si = document.createElement("input");
  si.type = "text"; si.value = subject; si.readOnly = true;
  si.style.cssText = "width:100%;border:2px solid #88c8c8;border-radius:6px;padding:8px;font-size:14px;color:#000;box-sizing:border-box;margin-bottom:6px";
  si.onclick = function(){ this.select(); };
  box.appendChild(si);

  // Body
  var lbl3 = document.createElement("div");
  lbl3.style.cssText = "font-size:14px;font-weight:bold;color:#0a3030;margin-bottom:4px";
  lbl3.textContent = "Email body:";
  box.appendChild(lbl3);

  var ba = document.createElement("textarea");
  ba.value = body; ba.readOnly = true;
  ba.style.cssText = "width:100%;height:200px;border:2px solid #88c8c8;border-radius:6px;padding:8px;font-size:14px;color:#000;box-sizing:border-box;font-family:Arial,sans-serif;margin-bottom:6px";
  ba.onclick = function(){ this.select(); };
  box.appendChild(ba);

  box.appendChild(makeBtn("Copy Body", "#1a7878", function(){
    ba.select();
    try{ navigator.clipboard.writeText(ba.value).then(function(){ ba.style.background="#eaf8f8"; setTimeout(function(){ ba.style.background=""; },1500); }); }
    catch(e){ document.execCommand("copy"); }
  }));

  // Open Gmail
  var gmailBtn = document.createElement("button");
  gmailBtn.textContent = "Open Gmail";
  gmailBtn.style.cssText = "display:block;width:100%;padding:12px;background:#0a6035;color:white;border:none;border-radius:6px;font-size:16px;cursor:pointer;font-family:Georgia,serif;margin-bottom:10px;margin-top:4px";
  gmailBtn.onclick = function(){
    window.open("https://mail.google.com/mail/?view=cm&fs=1&su="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body), "_blank");
  };
  box.appendChild(gmailBtn);

  // Mark as sent + close
  var doneBtn = document.createElement("button");
  doneBtn.textContent = "Mark as Sent & Close";
  doneBtn.style.cssText = "display:block;width:100%;padding:12px;background:#1a7878;color:white;border:none;border-radius:6px;font-size:16px;cursor:pointer;font-family:Georgia,serif;margin-bottom:10px";
  doneBtn.onclick = function(){ if(onSent) onSent(); overlay.remove(); };
  box.appendChild(doneBtn);

  var closeBtn = document.createElement("button");
  closeBtn.textContent = "Close";
  closeBtn.style.cssText = "display:block;width:100%;padding:12px;background:#eee;color:#333;border:none;border-radius:6px;font-size:16px;cursor:pointer;font-family:Georgia,serif";
  closeBtn.onclick = function(){ overlay.remove(); };
  box.appendChild(closeBtn);

  overlay.appendChild(box);
  document.body.appendChild(overlay);
}



function renderHistory(main){
  var allMembers = [...D.core, ...D.reserve];
  var past = D.sessions.filter(function(s){ return !isUpcoming(s); })
    .sort(function(a,b){ return b.date.localeCompare(a.date); }); // newest first

  var html = '<div style="margin-bottom:16px">';
  html += '<div style="font-size:19px;font-weight:bold;color:#000;margin-bottom:4px">Attendance History</div>';
  html += '<div style="font-size:15px;color:#555">' + past.length + ' past session' + (past.length!==1?'s':'') + '</div>';
  html += '</div>';

  if(past.length === 0){
    html += '<div style="text-align:center;padding:40px;color:#888;font-size:16px">No past sessions yet.</div>';
    main.innerHTML = html;
    return;
  }

  past.forEach(function(session){
    var rsvps = session.rsvps || {};

    // Core who attended (not opted out)
    var coreAttended = D.core.filter(function(m){
      var r = rsvps[m.id];
      return !r || r.status !== 'no';
    });

    // Reserve who confirmed
    var reserveAttended = D.reserve.filter(function(m){
      var r = rsvps[m.id];
      return r && r.status === 'yes';
    });

    var total = coreAttended.length + reserveAttended.length;
    var sets = Array.isArray(session.bringSet) ? session.bringSet : (session.bringSet ? [session.bringSet] : []);

    html += '<div style="background:#ffffff;border:1px solid #88c8c8;border-radius:10px;padding:14px;margin-bottom:12px">';

    // Session header
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
    html += '<div style="font-size:17px;font-weight:bold;color:#000">' + toDateStr(session.date) + '</div>';
    html += '<div style="font-size:15px;color:#1a7878;font-weight:bold">' + total + ' players</div>';
    html += '</div>';

    // Set info
    if(sets.length){
      html += '<div style="font-size:14px;color:#555;margin-bottom:8px">&#127004; Sets: ' + sets.join(', ') + '</div>';
    }

    // Player list
    if(coreAttended.length + reserveAttended.length > 0){
      html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">';
      coreAttended.forEach(function(m){
        html += '<span style="background:#eaf8f8;border:1px solid #88c8c8;border-radius:20px;padding:4px 10px;font-size:14px;color:#000">&#11088; ' + m.name + '</span>';
      });
      reserveAttended.forEach(function(m){
        html += '<span style="background:#f0f8e8;border:1px solid #88c848;border-radius:20px;padding:4px 10px;font-size:14px;color:#000">&#128336; ' + m.name + '</span>';
      });
      html += '</div>';
    } else {
      html += '<div style="font-size:14px;color:#888">No attendance recorded</div>';
    }

    html += '</div>';
  });

  main.innerHTML = html;
}

function switchView(v){
  view=v; selId=null; showNew=false; showRecurring=false;
  showAddMember=false; showImport=false; showEdit=false;
  render();
}

// ─── Init ─────────────────────────────────────────────────────────────────────
loadData();
persist=!!localStorage.getItem(STORAGE_KEY);
if(persist){
  document.getElementById("btn-persist").className="btn-persist on";
  document.getElementById("btn-persist").textContent="💾 Saving";
}
setInterval(()=>{tileIdx=(tileIdx+1)%TILES.length;document.getElementById("tile-icon").textContent=TILES[tileIdx];},2800);

// Connect to Firebase - wait until Firebase SDK and config are ready
onFirebaseReady(function(){
  if(typeof window.fbInit !== 'undefined' && window.db){
  window.fbInit(D, function(cloudData){
    // Migrate old field names if needed
    if(cloudData.regulars && !cloudData.core) cloudData.core = cloudData.regulars;
    if(cloudData.waitlist && !cloudData.reserve) cloudData.reserve = cloudData.waitlist;
    // Ensure required arrays exist
    if(!cloudData.core) cloudData.core = [];
    if(!cloudData.reserve) cloudData.reserve = [];
    if(!cloudData.sessions) cloudData.sessions = [];
    // Merge cloud data into local state
    D = cloudData;
    // Also save to localStorage for offline
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(D)); }catch{}
    render();
    // Update header to show connected
    var sub = document.getElementById("hd-sub");
    if(sub) sub.style.color = "#0a6035";
  });
  }
  var sub2 = document.getElementById("hd-sub");
  if(sub2){ sub2.textContent = sub2.textContent + " \u00b7 syncing..."; }
});


  </script>
